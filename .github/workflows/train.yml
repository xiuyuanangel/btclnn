name: LNN Train & Predict

on:
  schedule:
    - cron: '0 0,8,16 * * *'  # 每8小时运行一次(UTC 0:00, 8:00, 16:00)
  push:
    branches: [main, master]
    paths:
      - '*.py'
      - 'requirements.txt'
      - '.github/workflows/train.yml'

permissions:
  contents: write
  actions: write

concurrency:
  group: train-and-predict
  cancel-in-progress: true   # 新任务取消正在运行的任务(适用于push触发)

jobs:
  train-and-predict:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 缓存K线数据，避免每次重新获取
      - name: Cache K-line data
        uses: actions/cache@v4
        with:
          path: data/
          key: lnn-kline-data-${{ github.run_id }}
          restore-keys: |
            lnn-kline-data-

      # 缓存模型检查点(每次运行写入新key, 恢复时用前缀匹配)
      - name: Cache model checkpoint
        uses: actions/cache@v4
        with:
          path: checkpoints/
          key: lnn-model-${{ github.run_number }}
          restore-keys: |
            lnn-model-

      - name: Fetch data and train model
        env:
          EPOCHS: ${{ github.event.inputs.epochs || '50' }}
        run: python train.py

      - name: Run prediction
        if: success()
        run: python predict.py

      - name: Upload model artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lnn-model-${{ github.run_number }}
          path: checkpoints/
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +%Y%m%d-%H%M)"
          gh release create "$TAG" \
            checkpoints/*.pt \
            --title "Model $TAG" \
            --notes "BTC LNN Multi-Timeframe Model (run #${{ github.run_number }})" \
            --latest
