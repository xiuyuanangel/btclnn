name: LNN Train & Predict

on:
  schedule:
    - cron: '0 0,8,16 * * *'  # 每8小时运行一次(UTC 0:00, 8:00, 16:00)
  push:
    branches: [main, master]
    paths:
      - '*.py'
      - 'requirements.txt'
      - '.github/workflows/train.yml'

permissions:
  contents: write
  actions: write

concurrency:
  group: train-and-predict
  cancel-in-progress: ${{ github.event_name == 'push' }}  # 仅push触发时取消运行中的任务，定时任务排队等待

jobs:
  train-and-predict:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 缓存K线数据，避免每次重新获取
      - name: Cache K-line data
        uses: actions/cache@v4
        with:
          path: data/
          key: lnn-kline-data-${{ github.run_id }}
          restore-keys: |
            lnn-kline-data-

      # 缓存模型检查点(每次运行写入新key, 恢复时用前缀匹配)
      - name: Cache model checkpoint
        uses: actions/cache@v4
        with:
          path: checkpoints/
          key: lnn-model-${{ github.run_number }}
          restore-keys: |
              lnn-model-

      - name: 🖥️ Hardware Detection & System Info
        run: |
          echo "============================================"
          echo "  🔍 HARDWARE DETECTION"
          echo "============================================"
          echo ""
          echo "📋 CPU Info:"
          echo "  Cores: $(nproc)"
          cat /proc/cpuinfo | grep "model name" | sort | uniq -c | awk '{print "  Models:", $1, "x"$2}'
          echo "  Architecture: $(uname -m)"
          echo "  Thread(s) per core: $(lscpu | grep 'thread(s)' | head -1 | awk '{print $4}')"
          echo ""
          echo "💾 Memory (RAM):"
          free -h
          echo ""
          if command -v nvidia-smi &>/dev/null; then
            echo "🎮 GPU Info:"
            nvidia-smi --query-gpu=index,name,memory.total,memory.free,driver_version,persistence_mode --format=csv,noheader 2>/dev/null || true
            nvidia-smi --query-gpu=index,name,memory.total,memory.free --format=csv,noheader 2>/dev/null | awk -F',' 'NF>=4{gsub(/^[ \t]+|[ \t]+$/, "", $1); gsub(/^[ \t]+|[ \t]+/, "", $2); gsub(/^[ \t]+|[ \t]+/, "", $3); gsub(/^[ \t]+|[ \t]+/, "", $4); printf "  GPU[%s] %s | Total: %sMB | Free: %sMB\n", $1, $2, $3, $4}' || true
          else
            echo "  No GPU detected"
          fi
          echo ""
          echo "💾 Disk Usage:"
          df -h /
          echo ""
          echo "📊 OS Info:"
          cat /etc/os-release | head -3
          uname -a
          echo ""

      - name: Fetch data and train model
        env:
          EPOCHS: ${{ github.event.inputs.epochs || '50' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python train.py

      - name: Run prediction
        if: success()
        run: python predict.py

      - name: Upload model artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lnn-model-${{ github.run_number }}
          path: checkpoints/
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          TAG="v$(date +%Y%m%d-%H%M)"
          files=(checkpoints/*.pth)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No checkpoint files found; skipping release."
            exit 0
          fi
          gh release create "$TAG" "${files[@]}" \
            --title "Model $TAG" \
            --notes "BTC LNN Multi-Timeframe Model (run #${{ github.run_number }})" \
            --latest
